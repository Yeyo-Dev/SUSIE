<div class="face-loss-overlay" *ngIf="gazeService.isCountdownVisible()">
  <div class="glass-container">
    <div class="warning-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 9V14M12 17.01L12.01 16.998M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    
    <h1 class="title">Rostro no detectado</h1>
    
    <div class="countdown-wrapper">
      <span class="countdown-number" [class.danger]="gazeService.countdownValue() <= 3">
        {{ gazeService.countdownValue() }}
      </span>
      <span class="seconds-label">segundos</span>
    </div>
    
    <p class="instruction">
      Vuelve a encuadrar tu rostro para continuar con el examen.
    </p>
    
    <div class="pulse-ring"></div>
  </div>
</div>
